services:
  techkart-db:
    image: postgres:16
    container_name: techkart-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techkart
    volumes:
      - techkart_pg:/var/lib/postgresql/data

volumes:
  techkart_pg:

